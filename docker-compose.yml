services:
  mysql:
    image: mysql:8.4
    container_name: school_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: school_db
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3317:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./school-backend/school_db.sql:/docker-entrypoint-initdb.d/01-school.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./school-backend
    container_name: school_backend
    restart: unless-stopped
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: school_db
      DB_USERNAME: school_user
      DB_PASSWORD: school_pass
      JWT_SECRET: replace_with_a_long_random_secret
      JWT_TTL: 86400
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./school-frontend
    container_name: school_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:5
    container_name: school_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
